# FastAPI Starter Template - Docker Compose
# Simple, production-ready configuration

version: '3.8'

services:
  api:
    build: .
    container_name: fastapi-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # Persistent data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s